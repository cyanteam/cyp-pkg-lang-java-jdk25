name: Build JDK 25 Package

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cyp
        run: |
          curl -fsSL https://cyp.cyteam.cc.cd/install.sh | bash
          echo "$HOME/.cyp/bin" >> $GITHUB_PATH

      - name: Detect latest version
        id: version
        run: |
          FULL_VERSION=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=x64&image_type=jdk&os=linux&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['version']['semver'])")
          echo "version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "Latest JDK 25 version: $FULL_VERSION"

      - name: Update version in _CYPPACKAGE.TOML
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' _CYPPACKAGE.TOML

      - name: Download JDK - macOS ARM64 (Adoptium)
        run: |
          mkdir -p macosarm64/_CYPASSETS
          URL=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=aarch64&image_type=jdk&os=mac&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])")
          curl -fsSL "$URL" -o jdk.tar.gz
          tar -xzf jdk.tar.gz -C macosarm64/_CYPASSETS --strip-components=1
          rm jdk.tar.gz

      - name: Download JDK - macOS Intel (Adoptium)
        run: |
          mkdir -p macosintel/_CYPASSETS
          URL=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=x64&image_type=jdk&os=mac&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])")
          curl -fsSL "$URL" -o jdk.tar.gz
          tar -xzf jdk.tar.gz -C macosintel/_CYPASSETS --strip-components=1
          rm jdk.tar.gz

      - name: Download JDK - Linux x64 (Adoptium)
        run: |
          mkdir -p linux64/_CYPASSETS
          URL=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=x64&image_type=jdk&os=linux&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])")
          curl -fsSL "$URL" -o jdk.tar.gz
          tar -xzf jdk.tar.gz -C linux64/_CYPASSETS --strip-components=1
          rm jdk.tar.gz

      - name: Download JDK - Linux ARM64 (Adoptium)
        run: |
          mkdir -p linuxarm64/_CYPASSETS
          URL=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=aarch64&image_type=jdk&os=linux&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])")
          curl -fsSL "$URL" -o jdk.tar.gz
          tar -xzf jdk.tar.gz -C linuxarm64/_CYPASSETS --strip-components=1
          rm jdk.tar.gz

      - name: Download JDK - Windows x64 (Adoptium)
        run: |
          mkdir -p win64/_CYPASSETS
          URL=$(curl -s "https://api.adoptium.net/v3/assets/latest/25/hotspot?architecture=x64&image_type=jdk&os=windows&vendor=eclipse" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['binary']['package']['link'])")
          curl -fsSL "$URL" -o jdk.zip
          unzip -q jdk.zip -d win64/_CYPASSETS_tmp
          cd win64/_CYPASSETS_tmp && subdir=$(ls -d */ | head -1) && mv "$subdir"* ../_CYPASSETS/ && cd ../../.. && rm -rf win64/_CYPASSETS_tmp
          rm -f jdk.zip

      - name: Pack with cyp
        run: |
          cyp pack .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          files: "*.cyp"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
